<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f6f5f4"><title>Roam Mobile Reader</title><style>
:root{--paper:#fff;--warm:#f6f5f4;--ink:#242321;--muted:#77716b;--line:rgba(0,0,0,.1);--blue:#0075de;--side:310px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--warm);color:var(--ink);font:16px/1.75 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:22px 16px;background:#fbfaf9;border-right:1px solid var(--line);overflow:auto}.brand{font-size:20px;font-weight:750;letter-spacing:-.4px;padding:5px 8px}.sub{font-size:12px;color:var(--muted);padding:0 8px 15px}.search{width:100%;border:1px solid var(--line);background:#fff;border-radius:8px;padding:11px 12px;font:inherit;outline:none}.search:focus{border-color:var(--blue);box-shadow:0 0 0 3px #0075de18}.chapter{margin:22px 8px 7px;font-size:12px;color:var(--muted);font-weight:700}.lesson{display:block;width:100%;border:0;background:transparent;text-align:left;padding:9px 10px;border-radius:7px;color:var(--ink);cursor:pointer;line-height:1.35}.lesson:hover,.lesson.active{background:#ebe9e7}.main{min-width:0}.top{position:sticky;top:0;z-index:3;height:58px;display:flex;align-items:center;gap:10px;padding:0 24px;background:#fffffff0;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.menu{display:none;border:0;background:transparent;font-size:24px;min-width:44px;min-height:44px}.crumb{font-size:13px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.article{max-width:820px;margin:0 auto;background:var(--paper);min-height:calc(100vh - 58px);padding:54px 66px 100px}.article h1{font-size:34px;line-height:1.2;letter-spacing:-1px;margin:0 0 28px}.article h2{font-size:25px;line-height:1.3;margin:46px 0 14px}.article h3{font-size:19px;margin:32px 0 8px}.article p{margin:9px 0}.article ul,.article ol{padding-left:1.4em}.article li{margin:6px 0}.article code{background:#f1efed;padding:2px 6px;border-radius:5px;color:#615d59}.article a{color:var(--blue)}.empty{color:var(--muted);padding-top:20vh;text-align:center}.navbottom{display:flex;justify-content:space-between;gap:12px;margin-top:64px;padding-top:22px;border-top:1px solid var(--line)}.navbottom button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:10px 14px;min-height:44px;cursor:pointer}.progress{position:fixed;top:0;left:0;height:3px;background:var(--blue);z-index:9;width:0}.backdrop{display:none}.mobile-save{display:none}.selection-status{display:none}.tools{margin:14px 0;display:grid;gap:8px}.syncbtn{border:0;background:var(--blue);color:#fff;border-radius:7px;padding:11px;font-weight:650;min-height:44px;cursor:pointer}.syncbtn:disabled{opacity:.5}.hcount{font-size:12px;color:var(--muted);padding:0 4px}.highlight{background:#ffe58a;color:#242321;border-radius:2px;padding:0 1px}.selectable-block{cursor:pointer;border-radius:6px;transition:background .12s,outline .12s}.selectable-block.selected-block{background:#fff2a8!important;outline:2px solid #e3b900;outline-offset:3px}.selectable-block.saved-block{background:#fff2a8}.toast{position:fixed;left:50%;top:72px;transform:translateX(-50%);z-index:20;background:#242321;color:#fff;padding:11px 14px;border-radius:8px;box-shadow:0 8px 30px #0003;max-width:88vw;white-space:nowrap}.selecttip{font-size:12px;color:var(--muted);padding:8px 4px 0}
@media(max-width:760px){.app{display:block}.sidebar{position:fixed;z-index:8;left:0;top:0;width:min(88vw,340px);transform:translateX(-105%);transition:.2s;box-shadow:0 10px 40px #0002}.sidebar.open{transform:none}.backdrop.show{display:block;position:fixed;inset:0;background:#0004;z-index:7}.menu{display:block}.top{padding:0 10px}.article{padding:32px 20px 100px;min-height:calc(100vh - 58px);user-select:text!important;-webkit-user-select:text!important;-webkit-touch-callout:default!important}.article *{user-select:text!important;-webkit-user-select:text!important;-webkit-touch-callout:default!important}.article h1{font-size:29px}.article h2{font-size:22px}.lesson{min-height:44px}.selection-status.visible{display:block;position:fixed;z-index:6;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));background:#242321;color:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 8px 28px #0004}.selection-status .preview{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px;color:#ddd}.selection-status button{width:100%;border:0;background:var(--blue);color:#fff;border-radius:8px;min-height:44px;font-weight:700}.mobile-save{display:none}}
@media(prefers-color-scheme:dark){:root{--paper:#191918;--warm:#111;--ink:#eeeae6;--muted:#aaa39c;--line:rgba(255,255,255,.12)}.sidebar{background:#161615}.search,.navbottom button{background:#222;color:var(--ink)}.lesson:hover,.lesson.active{background:#2a2927}.top{background:#191918e8}.article code{background:#2b2927;color:#d1cbc5}}
</style></head><body><div class="progress" id="progress"></div><div class="backdrop" id="backdrop"></div><button class="mobile-save" id="mobileSave">保存划线</button><div class="selection-status" id="selectionStatus"><div class="preview" id="selectionPreview">长按正文选择文字</div><button id="selectionSave">保存划线</button></div><div class="app"><aside class="sidebar" id="sidebar"><div class="brand" id="siteTitle">Roam Mobile Reader</div><div class="sub" id="siteSubtitle">Mobile-first local reader</div><input class="search" id="search" placeholder="搜索课程或正文…"><div class="selecttip">选中文字后点“保存划线”</div><div class="tools"><button class="syncbtn" id="saveHighlight">保存划线</button><button class="syncbtn" id="syncHighlights">同步到 Roam</button><div class="hcount" id="hcount">0 条待同步</div></div><div id="toc"></div></aside><main class="main"><header class="top"><button class="menu" id="menu" aria-label="打开目录">☰</button><div class="crumb" id="crumb">选择一节课程开始阅读</div></header><article class="article" id="article"><div class="empty"><h1>Roam Mobile Reader</h1><p>Choose a lesson from the menu.</p></div></article></main></div><script>
let data=[],current=-1;const $=s=>document.querySelector(s),toc=$('#toc'),article=$('#article'),sidebar=$('#sidebar');let highlights=JSON.parse(localStorage.getItem('reader-highlights')||'[]');let pendingSelection='';let selectedBlocks=[];
async function init(){try{let c=await (await fetch('runtime-config.json')).json();if(c.site_title){$('#siteTitle').textContent=c.site_title;document.title=c.site_title}if(c.site_subtitle)$('#siteSubtitle').textContent=c.site_subtitle}catch{}data=await (await fetch('manifest.json')).json();renderToc(data);let saved=localStorage.getItem('reader-current');let i=saved?data.findIndex(x=>x.slug===saved):-1;if(i<0)i=0;openLesson(i)}
function renderToc(items){toc.innerHTML='';let last='';items.forEach(x=>{if(x.chapter!==last){let h=document.createElement('div');h.className='chapter';h.textContent=x.chapter;toc.append(h);last=x.chapter}let b=document.createElement('button');b.className='lesson';b.dataset.slug=x.slug;b.textContent=x.title;b.onclick=()=>openLesson(data.findIndex(y=>y.slug===x.slug));toc.append(b)})}
async function openLesson(i){if(i<0||i>=data.length)return;current=i;let x=data[i],body=await (await fetch('content/'+x.slug+'.html')).text();article.innerHTML='<h1>'+escapeHtml(x.title)+'</h1>'+body+`<div class="navbottom"><button ${i===0?'disabled':''} onclick="openLesson(${i-1})">← 上一节</button><button ${i===data.length-1?'disabled':''} onclick="openLesson(${i+1})">下一节 →</button></div>`;$('#crumb').textContent=x.chapter+' / '+x.title;document.querySelectorAll('.lesson').forEach(b=>b.classList.toggle('active',b.dataset.slug===x.slug));localStorage.setItem('reader-current',x.slug);setupBlocks();applyHighlights();updateCount();closeMenu();scrollTo(0,0)}
$('#search').oninput=e=>{let q=e.target.value.trim().toLowerCase();renderToc(q?data.filter(x=>(x.title+' '+x.search).toLowerCase().includes(q)):data)};function closeMenu(){sidebar.classList.remove('open');$('#backdrop').classList.remove('show')}$('#menu').onclick=()=>{sidebar.classList.add('open');$('#backdrop').classList.add('show')};$('#backdrop').onclick=closeMenu;addEventListener('scroll',()=>{$('#progress').style.width=((scrollY/(document.documentElement.scrollHeight-innerHeight||1))*100)+'%'});function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(s){let n=document.createElement('div');n.className='toast';n.textContent=s;document.body.append(n);setTimeout(()=>n.remove(),2800)}
function updateCount(){let n=highlights.filter(x=>!x.synced).length;$('#hcount').textContent=n+' 条待同步';$('#syncHighlights').disabled=!n}
function setupBlocks(){pendingSelection='';selectedBlocks=[];$('#selectionStatus').classList.remove('visible');$('#selectionPreview').textContent='点击正文块，可多选';let nodes=[...article.querySelectorAll('p,li')].filter(el=>!el.closest('.navbottom'));
function ownText(el){let c=el.cloneNode(true);c.querySelectorAll('ul,ol').forEach(x=>x.remove());return c.innerText.trim().replace(/\s+/g,' ')}
function setBlock(el,on){let text=ownText(el);if(text.length<2)return;let pos=selectedBlocks.findIndex(x=>x.el===el);if(on&&pos<0){selectedBlocks.push({text,el});el.classList.add('selected-block')}else if(!on&&pos>=0){selectedBlocks.splice(pos,1);el.classList.remove('selected-block')}}
nodes.forEach((el,i)=>{let t=ownText(el);if(t.length<2)return;el.classList.add('selectable-block');el.dataset.blockIndex=i;el.onclick=e=>{e.stopPropagation();let group=[el,...el.querySelectorAll('li,p')].filter(x=>nodes.includes(x)&&ownText(x).length>=2);let allOn=group.every(x=>selectedBlocks.some(y=>y.el===x));group.forEach(x=>setBlock(x,!allOn));pendingSelection=selectedBlocks.length?selectedBlocks[selectedBlocks.length-1].text:'';$('#selectionPreview').textContent=selectedBlocks.length?'已选择 '+selectedBlocks.length+' 个块'+(group.length>1?'（含子块）':''):'点击正文块，可多选';$('#selectionStatus').classList.toggle('visible',selectedBlocks.length>0)}})}
function textNodes(root){let w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:n=>n.parentElement.closest('.navbottom,.toast')?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT});let a=[];while(w.nextNode())a.push(w.currentNode);return a}
function applyHighlights(){let x=data[current];if(!x)return;let hs=highlights.filter(h=>h.slug===x.slug);hs.forEach(h=>{for(let n of textNodes(article)){let i=n.nodeValue.indexOf(h.text);if(i>=0){let r=document.createRange();r.setStart(n,i);r.setEnd(n,i+h.text.length);let m=document.createElement('mark');m.className='highlight';m.dataset.id=h.id;try{r.surroundContents(m)}catch{}break}}})}
function captureSelection(){let s=getSelection();if(s&&s.rangeCount&&article.contains(s.anchorNode)&&article.contains(s.focusNode)){let t=s.toString().trim().replace(/\s+/g,' ');if(t){pendingSelection=t;$('#selectionPreview').textContent='已选：'+t}}}
article.addEventListener('selectionchange',captureSelection);document.addEventListener('selectionchange',captureSelection);
function saveCurrentHighlight(){if(!selectedBlocks.length){toast('请先点击一个或多个正文块');return}let x=data[current],added=0;for(let b of selectedBlocks){let text=b.text;if(text.length>2000)continue;if(highlights.some(h=>h.slug===x.slug&&h.text===text)){b.el.classList.remove('selected-block');b.el.classList.add('saved-block');continue}highlights.push({id:(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random()),slug:x.slug,title:x.title,chapter:x.chapter,text,synced:false,createdAt:new Date().toISOString()});b.el.classList.remove('selected-block');b.el.classList.add('saved-block');added++}try{localStorage.setItem('reader-highlights',JSON.stringify(highlights))}catch(e){toast('保存失败：'+e.message);return}selectedBlocks=[];pendingSelection='';$('#selectionStatus').classList.remove('visible');$('#selectionPreview').textContent='已保存 '+added+' 个块';updateCount();toast('已保存 '+added+' 个高亮块')}
$('#saveHighlight').onclick=saveCurrentHighlight;$('#mobileSave').onclick=saveCurrentHighlight;$('#selectionSave').onclick=saveCurrentHighlight;
$('#syncHighlights').onclick=async()=>{let pending=highlights.filter(x=>!x.synced);if(!pending.length)return;$('#syncHighlights').disabled=true;$('#syncHighlights').textContent='同步中…';try{let r=await fetch('/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({highlights:pending})});let d=await r.json();if(!r.ok)throw Error(d.error||'同步失败');let ok=0,errs=[];for(let z of d.results||[]){let h=highlights.find(x=>x.id===z.id);if(h&&z.ok){h.synced=true;h.syncedAt=new Date().toISOString();h.error=null;ok++}else if(h){h.error=z.error;errs.push(z.error)}}localStorage.setItem('reader-highlights',JSON.stringify(highlights));updateCount();toast(errs.length?'同步 '+ok+'/'+pending.length+'；失败：'+errs[0]:'已同步 '+ok+'/'+pending.length+' 条到 Roam');}catch(e){toast(e.message)}finally{$('#syncHighlights').textContent='同步到 Roam';updateCount()}}
init();
</script></body></html>
